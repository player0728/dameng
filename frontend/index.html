<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据同步与Git仓库管理平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 20px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .tab {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .tab.active {
            background: white;
            color: #667eea;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid #e2e8f0;
        }

        .card-title {
            font-size: 20px;
            color: #1e293b;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd6;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .task-list {
            padding: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .task-item {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .task-item:hover {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .task-info h3 {
            color: #1e293b;
            margin-bottom: 5px;
        }

        .task-info p {
            color: #64748b;
            font-size: 14px;
        }

        .task-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-running {
            background: #dcfce7;
            color: #16a34a;
        }

        .status-stopped {
            background: #fef2f2;
            color: #dc2626;
        }

        .task-item.has-update {
            border-left: 4px solid #f59e0b;
        }

        .update-alert {
            padding: 8px 12px;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 6px;
            animation: pulse 1s ease-in-out infinite;
        }

        .update-alert .detail-label,
        .update-alert .detail-value {
            color: #92400e !important;
            font-weight: 500;
        }

        .btn-update {
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .confirm-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .confirm-modal.active {
            display: flex;
        }

        .confirm-content {
            background: white;
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .confirm-content h3 {
            margin-bottom: 15px;
            color: #1e293b;
            font-size: 18px;
        }

        .confirm-content p {
            color: #64748b;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .confirm-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .task-details {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 8px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 3px;
        }

        .detail-value {
            font-size: 14px;
            color: #334155;
            font-weight: 500;
        }

        .task-actions {
            display: flex;
            gap: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid #e2e8f0;
        }

        .modal-title {
            font-size: 18px;
            color: #1e293b;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #94a3b8;
        }

        .modal-close:hover {
            color: #64748b;
        }

        #git-form, #sync-form {
            padding: 20px 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #475569;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-select {
            cursor: pointer;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .alert-success {
            background: #dcfce7;
            color: #16a34a;
        }

        .alert-error {
            background: #fef2f2;
            color: #dc2626;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .status-bar {
                flex-direction: column;
                align-items: center;
            }

            .tabs {
                flex-wrap: wrap;
                justify-content: center;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .task-details {
                grid-template-columns: 1fr;
            }

            .task-actions {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 数据同步与Git仓库管理平台</h1>
            <p>统一的 Git 仓库监控与 API 数据同步管理界面</p>
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-dot"></div>
                    <span>系统运行中</span>
                </div>
                <div class="status-item">
                    <span>🕐</span>
                    <span id="current-time"></span>
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showSection('git')">📦 Git 仓库监控</button>
            <button class="tab" onclick="showSection('sync')">🔄 API 数据同步</button>
            <button class="tab" onclick="showSection('db-sync')">🗄️ 数据库同步</button>
        </div>

        <div id="section-git" class="section active">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Git 仓库监控任务</h2>
                    <button class="btn btn-primary" onclick="openGitModal()">+ 创建任务</button>
                </div>

                <div id="git-alert"></div>

                <div id="git-task-list" class="task-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <p>暂无 Git 监控任务</p>
                        <p style="font-size: 14px; margin-top: 10px;">点击上方按钮创建第一个任务</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="section-sync" class="section">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">API 数据同步任务</h2>
                    <button class="btn btn-primary" onclick="openSyncModal()">+ 创建任务</button>
                </div>

                <div id="sync-alert"></div>

                <div id="sync-task-list" class="task-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">🔄</div>
                        <p>暂无数据同步任务</p>
                        <p style="font-size: 14px; margin-top: 10px;">点击上方按钮创建第一个任务</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="section-db-sync" class="section">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">数据库同步任务</h2>
                    <button class="btn btn-primary" onclick="openDbSyncModal()">+ 创建任务</button>
                </div>

                <div id="db-sync-alert"></div>

                <div id="db-sync-task-list" class="task-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">🗄️</div>
                        <p>暂无数据库同步任务</p>
                        <p style="font-size: 14px; margin-top: 10px;">点击上方按钮创建第一个任务</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="git-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">创建 Git 监控任务</h3>
                <button class="modal-close" onclick="closeGitModal()">&times;</button>
            </div>
            <form id="git-form" onsubmit="createGitTask(event)">
                <div class="form-group">
                    <label class="form-label">仓库地址 (HTTPS/SSH)</label>
                    <input type="text" id="git-repo-url" class="form-input" placeholder="https://github.com/用户名/仓库.git" required>
                </div>
                <div class="form-group">
                    <label class="form-label">本地仓库路径</label>
                    <input type="text" id="git-local-path" class="form-input" placeholder="D:/git/myrepo" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">分支名</label>
                        <input type="text" id="git-branch" class="form-input" value="main" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">监控模式</label>
                        <select id="git-mode" class="form-select">
                            <option value="manual">手动模式</option>
                            <option value="auto">自动模式</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">轮询间隔 (秒)</label>
                    <input type="number" id="git-interval" class="form-input" value="60" min="10" required>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn btn-danger" onclick="closeGitModal()">取消</button>
                    <button type="submit" class="btn btn-success">创建任务</button>
                </div>
            </form>
        </div>
    </div>

    <div id="confirm-modal" class="confirm-modal">
        <div class="confirm-content">
            <h3>⚠️ 确认拉取更新</h3>
            <p>检测到远程仓库有新的更新。确定要拉取更新到本地仓库吗？</p>
            <div class="confirm-actions">
                <button class="btn btn-danger" onclick="closeConfirmModal()">取消</button>
                <button class="btn btn-success" onclick="confirmPull()">确认拉取</button>
            </div>
        </div>
    </div>

    <div id="db-sync-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">创建数据库同步任务</h3>
                <button class="modal-close" onclick="closeDbSyncModal()">&times;</button>
            </div>
            <form id="db-sync-form" onsubmit="createDbSyncTask(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">源数据库类型</label>
                        <select id="db-sync-source-type" class="form-select" onchange="loadSourceDatabases()">
                            <option value="mysql">MySQL</option>
                            <option value="dameng">达梦</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">目标数据库类型</label>
                        <select id="db-sync-target-type" class="form-select" onchange="loadTargetDatabases()">
                            <option value="mysql">MySQL</option>
                            <option value="dameng">达梦</option>
                        </select>
                    </div>
                </div>
                
                <h4 style="margin: 15px 0 10px; color: #475569;">源数据库配置</h4>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">源主机</label>
                        <input type="text" id="db-sync-source-host" class="form-input" placeholder="localhost" required onchange="loadSourceDatabases()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">源端口</label>
                        <input type="number" id="db-sync-source-port" class="form-input" value="3306" required onchange="loadSourceDatabases()">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">源用户名</label>
                        <input type="text" id="db-sync-source-user" class="form-input" placeholder="root" required onchange="loadSourceDatabases()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">源密码</label>
                        <input type="password" id="db-sync-source-password" class="form-input" onchange="loadSourceDatabases()">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">源数据库</label>
                        <select id="db-sync-source-database" class="form-select" onchange="loadSourceTables()">
                            <option value="">请选择数据库</option>
                        </select>
                        <button type="button" class="btn btn-sm" onclick="loadSourceDatabases()" style="margin-top: 5px;">🔄 刷新</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label">源表名</label>
                        <select id="db-sync-source-table-select" class="form-select" onchange="loadSourceFields()">
                            <option value="">请选择表</option>
                        </select>
                        <input type="text" id="db-sync-source-table" class="form-input" placeholder="输入表名或选择" required style="margin-top: 5px;">
                    </div>
                </div>

                <div id="db-sync-fields-section" style="margin-top: 15px;">
                    <h4 style="margin-bottom: 10px; color: #475569;">字段映射</h4>
                    <div id="db-sync-fields-list"></div>
                </div>

                <h4 style="margin: 20px 0 10px; color: #475569;">目标数据库配置</h4>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">目标主机</label>
                        <input type="text" id="db-sync-target-host" class="form-input" placeholder="localhost" required onchange="loadTargetDatabases()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">目标端口</label>
                        <input type="number" id="db-sync-target-port" class="form-input" value="3306" required onchange="loadTargetDatabases()">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">目标用户名</label>
                        <input type="text" id="db-sync-target-user" class="form-input" placeholder="root" required onchange="loadTargetDatabases()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">目标密码</label>
                        <input type="password" id="db-sync-target-password" class="form-input" onchange="loadTargetDatabases()">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">目标数据库</label>
                        <select id="db-sync-target-database" class="form-select" onchange="loadTargetTables()">
                            <option value="">请选择数据库</option>
                        </select>
                        <button type="button" class="btn btn-sm" onclick="loadTargetDatabases()" style="margin-top: 5px;">🔄 刷新</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label">目标表名</label>
                        <select id="db-sync-target-table-select" class="form-select" onchange="updateTargetTableInput()">
                            <option value="">请选择表</option>
                            <option value="__new__">+ 新建表</option>
                        </select>
                        <input type="text" id="db-sync-target-table" class="form-input" placeholder="输入新表名或选择" required style="margin-top: 5px;">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">同步模式</label>
                    <select id="db-sync-mode" class="form-select">
                        <option value="batch">批量同步</option>
                        <option value="streaming">实时同步 (CDC)</option>
                    </select>
                </div>

                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn btn-danger" onclick="closeDbSyncModal()">取消</button>
                    <button type="submit" class="btn btn-success">创建任务</button>
                </div>
            </form>
        </div>
    </div>

    <div id="sync-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">创建 API 同步任务</h3>
                <button class="modal-close" onclick="closeSyncModal()">&times;</button>
            </div>
            <form id="sync-form" onsubmit="createSyncTask(event)">
                <div class="form-group">
                    <label class="form-label">API 地址</label>
                    <input type="text" id="sync-api-url" class="form-input" placeholder="https://api.example.com/data" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">HTTP 方法</label>
                        <select id="sync-method" class="form-select">
                            <option value="GET">GET</option>
                            <option value="POST">POST</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">JSON 数据路径</label>
                        <input type="text" id="sync-json-path" class="form-input" value="results" placeholder="results">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">目标数据库类型</label>
                    <select id="sync-db-type" class="form-select" onchange="loadDatabases()">
                        <option value="mysql">MySQL</option>
                        <option value="postgresql">PostgreSQL</option>
                        <option value="dameng">达梦</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">目标主机</label>
                        <input type="text" id="sync-host" class="form-input" placeholder="localhost" required onchange="loadDatabases()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">目标端口</label>
                        <input type="number" id="sync-port" class="form-input" value="3306" required onchange="loadDatabases()">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" id="sync-user" class="form-input" placeholder="root" required onchange="loadDatabases()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" id="sync-password" class="form-input" onchange="loadDatabases()">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">目标数据库</label>
                        <select id="sync-database" class="form-select" onchange="loadTables()">
                            <option value="">请选择数据库</option>
                        </select>
                        <button type="button" class="btn btn-sm" onclick="loadDatabases()" style="margin-top: 5px;">🔄 刷新数据库列表</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label">目标表名</label>
                        <select id="sync-table-select" class="form-select" onchange="updateTableInput()">
                            <option value="">请选择表</option>
                            <option value="__new__">+ 新建表</option>
                        </select>
                        <input type="text" id="sync-table" class="form-input" placeholder="输入新表名或从上方选择" required style="margin-top: 5px;">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">轮询间隔 (秒)</label>
                    <input type="number" id="sync-interval" class="form-input" value="60" min="10" required>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn btn-danger" onclick="closeSyncModal()">取消</button>
                    <button type="submit" class="btn btn-success">创建任务</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let gitRefreshInterval = null;
        let syncRefreshInterval = null;
        let dbSyncRefreshInterval = null;

        function startDbSyncRefresh() {
            if (dbSyncRefreshInterval) clearInterval(dbSyncRefreshInterval);
            dbSyncRefreshInterval = setInterval(() => {
                if (document.querySelector('#section-db-sync.active')) {
                    loadDbSyncTasks();
                }
            }, 5000); // 每5秒刷新一次
        }

        function stopDbSyncRefresh() {
            if (dbSyncRefreshInterval) {
                clearInterval(dbSyncRefreshInterval);
                dbSyncRefreshInterval = null;
            }
        }

        function startGitRefresh() {
            if (gitRefreshInterval) clearInterval(gitRefreshInterval);
            gitRefreshInterval = setInterval(() => {
                if (document.querySelector('#section-git.active')) {
                    loadGitTasks();
                }
            }, 3000); // 每3秒刷新一次
        }

        function stopGitRefresh() {
            if (gitRefreshInterval) {
                clearInterval(gitRefreshInterval);
                gitRefreshInterval = null;
            }
        }

        function startSyncRefresh() {
            if (syncRefreshInterval) clearInterval(syncRefreshInterval);
            syncRefreshInterval = setInterval(() => {
                if (document.querySelector('#section-sync.active')) {
                    loadSyncTasks();
                }
            }, 5000); // 每5秒刷新一次
        }

        function stopSyncRefresh() {
            if (syncRefreshInterval) {
                clearInterval(syncRefreshInterval);
                syncRefreshInterval = null;
            }
        }

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`section-${section}`).classList.add('active');
            event.target.classList.add('active');

            if (section === 'git') {
                loadGitTasks();
                startGitRefresh();
                stopSyncRefresh();
                stopDbSyncRefresh();
            } else if (section === 'sync') {
                loadSyncTasks();
                startSyncRefresh();
                stopGitRefresh();
                stopDbSyncRefresh();
            } else if (section === 'db-sync') {
                loadDbSyncTasks();
                startDbSyncRefresh();
                stopGitRefresh();
                stopSyncRefresh();
            }
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleString('zh-CN');
        }

        setInterval(updateTime, 1000);
        updateTime();

        function showAlert(type, message, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN');
        }

        async function loadDatabases() {
            const dbType = document.getElementById('sync-db-type').value;
            const host = document.getElementById('sync-host').value;
            const port = document.getElementById('sync-port').value;
            const user = document.getElementById('sync-user').value;
            const password = document.getElementById('sync-password').value;

            if (!host || !port || !user) return;

            try {
                const response = await fetch(`${API_BASE}/api/databases?db_type=${dbType}&host=${host}&port=${port}&user=${user}&password=${password}`);
                const result = await response.json();

                const select = document.getElementById('sync-database');
                select.innerHTML = '<option value="">请选择数据库</option>';

                if (result.success && result.databases) {
                    result.databases.forEach(db => {
                        const option = document.createElement('option');
                        option.value = db;
                        option.textContent = db;
                        select.appendChild(option);
                    });
                } else if (result.error) {
                    showAlert('error', '加载数据库列表失败: ' + result.error, 'sync-alert');
                }
            } catch (error) {
                showAlert('error', '加载数据库列表失败: ' + error.message, 'sync-alert');
            }
        }

        async function loadTables() {
            const dbType = document.getElementById('sync-db-type').value;
            const host = document.getElementById('sync-host').value;
            const port = document.getElementById('sync-port').value;
            const user = document.getElementById('sync-user').value;
            const password = document.getElementById('sync-password').value;
            const database = document.getElementById('sync-database').value;

            if (!database) return;

            try {
                const response = await fetch(`${API_BASE}/api/databases/${database}/tables?db_type=${dbType}&host=${host}&port=${port}&user=${user}&password=${password}`);
                const result = await response.json();

                const select = document.getElementById('sync-table-select');
                select.innerHTML = '<option value="">请选择表</option><option value="__new__">+ 新建表</option>';

                if (result.success && result.tables) {
                    result.tables.forEach(table => {
                        const option = document.createElement('option');
                        option.value = table;
                        option.textContent = table;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.log('加载表列表失败:', error);
            }
        }

        function updateTableInput() {
            const select = document.getElementById('sync-table-select');
            const input = document.getElementById('sync-table');

            if (select.value && select.value !== '__new__') {
                input.value = select.value;
                input.disabled = true;
            } else {
                input.value = '';
                input.disabled = false;
            }
        }

        async function loadGitTasks() {
            try {
                const response = await fetch(`${API_BASE}/api/git/tasks`);
                const tasks = await response.json();
                const container = document.getElementById('git-task-list');

                if (tasks.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📦</div>
                            <p>暂无 Git 监控任务</p>
                            <p style="font-size: 14px; margin-top: 10px;">点击上方按钮创建第一个任务</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = tasks.map(task => `
                    <div class="task-item ${task.has_updates && task.mode === 'manual' ? 'has-update' : ''}">
                        <div class="task-header">
                            <div class="task-info">
                                <h3>${task.repo_url.split('/').pop().replace('.git', '')}</h3>
                                <p>${task.repo_url}</p>
                            </div>
                            <span class="task-status ${task.status === 'running' ? 'status-running' : 'status-stopped'}">
                                ${task.status === 'running' ? '运行中' : '已停止'}
                            </span>
                        </div>
                        <div class="task-details">
                            <div class="detail-item">
                                <span class="detail-label">分支</span>
                                <span class="detail-value">${task.branch}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">监控模式</span>
                                <span class="detail-value">${task.mode === 'auto' ? '自动' : '手动'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">轮询间隔</span>
                                <span class="detail-value">${task.polling_interval}秒</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">本地路径</span>
                                <span class="detail-value">${task.local_path}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">最后检查</span>
                                <span class="detail-value">${formatDate(task.last_check)}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">最后更新</span>
                                <span class="detail-value">${formatDate(task.last_update)}</span>
                            </div>
                            ${task.has_updates && task.mode === 'manual' ? `
                            <div class="detail-item update-alert">
                                <span class="detail-label">⚠️ 更新提醒</span>
                                <span class="detail-value">检测到远程仓库有新更新！</span>
                            </div>
                            ` : ''}
                        </div>
                        <div class="task-actions">
                            ${task.status === 'running' ? `
                                <button class="btn btn-warning" onclick="stopGitTask(${task.id})">⏹ 停止</button>
                            ` : `
                                <button class="btn btn-success" onclick="startGitTask(${task.id})">▶ 启动</button>
                            `}
                            ${task.has_updates && task.mode === 'manual' ? `
                                <button class="btn btn-success btn-update" onclick="confirmPullGitTask(${task.id})">📥 确认拉取更新</button>
                            ` : ''}
                            <button class="btn btn-primary" onclick="refreshGitStatus(${task.id})">🔄 刷新状态</button>
                            <button class="btn btn-danger" onclick="deleteGitTask(${task.id})">🗑 删除</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showAlert('error', '加载任务失败: ' + error.message, 'git-alert');
            }
        }

        async function loadSyncTasks() {
            try {
                const response = await fetch(`${API_BASE}/api/sync/tasks`);
                const tasks = await response.json();
                const container = document.getElementById('sync-task-list');

                if (tasks.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">🔄</div>
                            <p>暂无数据同步任务</p>
                            <p style="font-size: 14px; margin-top: 10px;">点击上方按钮创建第一个任务</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = tasks.map(task => `
                    <div class="task-item">
                        <div class="task-header">
                            <div class="task-info">
                                <h3>${task.target_database}.${task.target_table}</h3>
                                <p>${task.api_url}</p>
                            </div>
                            <span class="task-status ${task.status === 'running' ? 'status-running' : 'status-stopped'}">
                                ${task.status === 'running' ? '运行中' : '已停止'}
                            </span>
                        </div>
                        <div class="task-details">
                            <div class="detail-item">
                                <span class="detail-label">API 地址</span>
                                <span class="detail-value">${task.api_url}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">HTTP 方法</span>
                                <span class="detail-value">${task.api_method}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">JSON 路径</span>
                                <span class="detail-value">${task.json_path}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">目标库</span>
                                <span class="detail-value">${task.target_host}:${task.target_port}/${task.target_database}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">已同步记录</span>
                                <span class="detail-value">${task.records_synced}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">最后同步</span>
                                <span class="detail-value">${formatDate(task.last_sync)}</span>
                            </div>
                            ${task.sync_status ? `
                            <div class="detail-item">
                                <span class="detail-label">同步状态</span>
                                <span class="detail-value">${task.sync_status}</span>
                            </div>
                            ` : ''}
                        </div>
                        <div class="task-actions">
                            ${task.status === 'running' ? `
                                <button class="btn btn-warning" onclick="stopSyncTask(${task.id})">⏹ 停止</button>
                            ` : `
                                <button class="btn btn-success" onclick="startSyncTask(${task.id})">▶ 启动</button>
                            `}
                            <button class="btn btn-primary" onclick="syncNow(${task.id})">⚡ 立即同步</button>
                            <button class="btn btn-primary" onclick="refreshSyncStatus(${task.id})">🔄 刷新状态</button>
                            <button class="btn btn-danger" onclick="deleteSyncTask(${task.id})">🗑 删除</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showAlert('error', '加载任务失败: ' + error.message, 'sync-alert');
            }
        }

        function openGitModal() {
            document.getElementById('git-modal').classList.add('active');
        }

        function closeGitModal() {
            document.getElementById('git-modal').classList.remove('active');
            document.getElementById('git-form').reset();
        }

        function openSyncModal() {
            document.getElementById('sync-modal').classList.add('active');
        }

        function closeSyncModal() {
            document.getElementById('sync-modal').classList.remove('active');
            document.getElementById('sync-form').reset();
            document.getElementById('sync-database').innerHTML = '<option value="">请选择数据库</option>';
            document.getElementById('sync-table-select').innerHTML = '<option value="">请选择表</option><option value="__new__">+ 新建表</option>';
        }

        async function createGitTask(event) {
            event.preventDefault();
            const task = {
                repo_url: document.getElementById('git-repo-url').value,
                local_path: document.getElementById('git-local-path').value,
                branch: document.getElementById('git-branch').value,
                mode: document.getElementById('git-mode').value,
                polling_interval: parseInt(document.getElementById('git-interval').value)
            };

            try {
                const response = await fetch(`${API_BASE}/api/git/tasks`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(task)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '创建失败');
                }

                showAlert('success', 'Git 任务创建成功！', 'git-alert');
                closeGitModal();
                loadGitTasks();
            } catch (error) {
                showAlert('error', '创建失败: ' + error.message, 'git-alert');
            }
        }

        async function createSyncTask(event) {
            event.preventDefault();
            const task = {
                api_url: document.getElementById('sync-api-url').value,
                api_method: document.getElementById('sync-method').value,
                json_path: document.getElementById('sync-json-path').value,
                target_db_type: document.getElementById('sync-db-type').value,
                target_host: document.getElementById('sync-host').value,
                target_port: parseInt(document.getElementById('sync-port').value),
                target_user: document.getElementById('sync-user').value,
                target_password: document.getElementById('sync-password').value,
                target_database: document.getElementById('sync-database').value,
                target_table: document.getElementById('sync-table').value,
                polling_interval: parseInt(document.getElementById('sync-interval').value)
            };

            try {
                const response = await fetch(`${API_BASE}/api/sync/tasks`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(task)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '创建失败');
                }

                showAlert('success', '同步任务创建成功！', 'sync-alert');
                closeSyncModal();
                loadSyncTasks();
            } catch (error) {
                showAlert('error', '创建失败: ' + error.message, 'sync-alert');
            }
        }

        async function startGitTask(taskId) {
            try {
                const response = await fetch(`${API_BASE}/api/git/tasks/${taskId}/start`, {
                    method: 'POST'
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '启动失败');
                }
                showAlert('success', '任务已启动！', 'git-alert');
                loadGitTasks();
            } catch (error) {
                showAlert('error', '启动失败: ' + error.message, 'git-alert');
            }
        }

        async function stopGitTask(taskId) {
            try {
                const response = await fetch(`${API_BASE}/api/git/tasks/${taskId}/stop`, {
                    method: 'POST'
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '停止失败');
                }
                showAlert('success', '任务已停止！', 'git-alert');
                loadGitTasks();
            } catch (error) {
                showAlert('error', '停止失败: ' + error.message, 'git-alert');
            }
        }

        let pendingTaskId = null;

        function confirmPullGitTask(taskId) {
            pendingTaskId = taskId;
            document.getElementById('confirm-modal').classList.add('active');
        }

        function closeConfirmModal() {
            pendingTaskId = null;
            document.getElementById('confirm-modal').classList.remove('active');
        }

        async function confirmPull() {
            if (!pendingTaskId) return;
            const taskId = pendingTaskId;
            closeConfirmModal();

            try {
                const response = await fetch(`${API_BASE}/api/git/tasks/${taskId}/pull`, {
                    method: 'POST'
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '拉取失败');
                }
                const result = await response.json();
                showAlert('success', '拉取成功！' + (result.output || ''), 'git-alert');
                loadGitTasks();
            } catch (error) {
                showAlert('error', '拉取失败: ' + error.message, 'git-alert');
            }
        }

        async function pullGitTask(taskId) {
            try {
                const response = await fetch(`${API_BASE}/api/git/tasks/${taskId}/pull`, {
                    method: 'POST'
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '拉取失败');
                }
                const result = await response.json();
                showAlert('success', '拉取成功！' + (result.output || ''), 'git-alert');
                loadGitTasks();
            } catch (error) {
                showAlert('error', '拉取失败: ' + error.message, 'git-alert');
            }
        }

        async function refreshGitStatus(taskId) {
            try {
                const response = await fetch(`${API_BASE}/api/git/tasks/${taskId}/status`);
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '刷新失败');
                }
                showAlert('success', '状态已刷新！', 'git-alert');
                loadGitTasks();
            } catch (error) {
                showAlert('error', '刷新失败: ' + error.message, 'git-alert');
            }
        }

        async function deleteGitTask(taskId) {
            if (!confirm('确定要删除这个任务吗？')) return;
            try {
                const response = await fetch(`${API_BASE}/api/git/tasks/${taskId}`, {
                    method: 'DELETE'
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '删除失败');
                }
                showAlert('success', '任务已删除！', 'git-alert');
                loadGitTasks();
            } catch (error) {
                showAlert('error', '删除失败: ' + error.message, 'git-alert');
            }
        }

        async function startSyncTask(taskId) {
            try {
                const response = await fetch(`${API_BASE}/api/sync/tasks/${taskId}/start`, {
                    method: 'POST'
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '启动失败');
                }
                showAlert('success', '任务已启动！', 'sync-alert');
                loadSyncTasks();
            } catch (error) {
                showAlert('error', '启动失败: ' + error.message, 'sync-alert');
            }
        }

        async function stopSyncTask(taskId) {

                const response = await fetch(`${API_BASE}/api/sync/tasks/${taskId}/stop`, {
                    method: 'POST'
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '停止失败');
                }
                showAlert('success', '任务已停止！', 'sync-alert');
                loadSyncTasks();
            } catch (error) {
                showAlert('error', '停止失败: ' + error.message, 'sync-alert');
            }
        }

        async function syncNow(taskId) {
            try {
                const response = await fetch(`${API_BASE}/api/sync/tasks/${taskId}/sync-now`, {
                    method: 'POST'
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '同步失败');
                }
                const result = await response.json();
                showAlert('success', '同步成功！' + (result.message || ''), 'sync-alert');
                loadSyncTasks();
            } catch (error) {
                showAlert('error', '同步失败: ' + error.message, 'sync-alert');
            }
        }

        async function refreshSyncStatus(taskId) {
            try {
                const response = await fetch(`${API_BASE}/api/sync/tasks/${taskId}/status`);
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '刷新失败');
                }
                showAlert('success', '状态已刷新！', 'sync-alert');
                loadSyncTasks();
            } catch (error) {
                showAlert('error', '刷新失败: ' + error.message, 'sync-alert');
            }
        }

        async function deleteSyncTask(taskId) {
            if (!confirm('确定要删除这个任务吗？')) return;
            try {
                const response = await fetch(`${API_BASE}/api/sync/tasks/${taskId}`, {
                    method: 'DELETE'
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '删除失败');
                }
                showAlert('success', '任务已删除！', 'sync-alert');
                loadSyncTasks();
            } catch (error) {
                showAlert('error', '删除失败: ' + error.message, 'sync-alert');
            }
        }

        setInterval(() => {
            if (document.getElementById('section-git').classList.contains('active')) {
                loadGitTasks();
            }
            if (document.getElementById('section-sync').classList.contains('active')) {
                loadSyncTasks();
            }
            if (document.getElementById('section-db-sync').classList.contains('active')) {
                loadDbSyncTasks();
            }
        }, 30000);

        // ========== 数据库同步相关函数 ==========

        async function loadDbSyncTasks() {
            try {
                const response = await fetch(`${API_BASE}/api/db-sync/tasks`);
                const tasks = await response.json();
                const container = document.getElementById('db-sync-task-list');

                if (tasks.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">🗄️</div>
                            <p>暂无数据库同步任务</p>
                            <p style="font-size: 14px; margin-top: 10px;">点击上方按钮创建第一个任务</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = tasks.map(task => `
                    <div class="task-item">
                        <div class="task-header">
                            <div class="task-info">
                                <h3>${task.source_database}.${task.source_table} → ${task.target_database}.${task.target_table}</h3>
                                <p>${task.source_type.toUpperCase()} → ${task.target_type.toUpperCase()}</p>
                            </div>
                            <span class="task-status ${task.status === 'running' ? 'status-running' : 'status-stopped'}">
                                ${task.status === 'running' ? '运行中' : '已停止'}
                            </span>
                        </div>
                        <div class="task-details">
                            <div class="detail-item">
                                <span class="detail-label">源库</span>
                                <span class="detail-value">${task.source_host}:${task.source_port}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">目标库</span>
                                <span class="detail-value">${task.target_host}:${task.target_port}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">同步模式</span>
                                <span class="detail-value">${task.mode === 'batch' ? '批量' : '实时 CDC'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">已同步记录</span>
                                <span class="detail-value">${task.records_synced || 0}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">最后同步</span>
                                <span class="detail-value">${formatDate(task.last_sync)}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">同步状态</span>
                                <span class="detail-value">${task.sync_status || '-'}</span>
                            </div>
                        </div>
                        <div class="task-actions">
                            ${task.status === 'running' ? `
                                <button class="btn btn-warning" onclick="stopDbSyncTask(${task.id})">⏹ 停止</button>
                            ` : `
                                <button class="btn btn-success" onclick="startDbSyncTask(${task.id})">▶ 启动</button>
                            `}
                            <button class="btn btn-primary" onclick="syncDbNow(${task.id})">⚡ 立即同步</button>
                            <button class="btn btn-primary" onclick="refreshDbSyncStatus(${task.id})">🔄 刷新状态</button>
                            <button class="btn btn-danger" onclick="deleteDbSyncTask(${task.id})">🗑 删除</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showAlert('error', '加载任务失败: ' + error.message, 'db-sync-alert');
            }
        }

        function openDbSyncModal() {
            document.getElementById('db-sync-modal').classList.add('active');
        }

        function closeDbSyncModal() {
            document.getElementById('db-sync-modal').classList.remove('active');
            document.getElementById('db-sync-form').reset();
            document.getElementById('db-sync-fields-list').innerHTML = '';
            document.getElementById('db-sync-source-database').innerHTML = '<option value="">请选择数据库</option>';
            document.getElementById('db-sync-source-table-select').innerHTML = '<option value="">请选择表</option>';
            document.getElementById('db-sync-target-database').innerHTML = '<option value="">请选择数据库</option>';
            document.getElementById('db-sync-target-table-select').innerHTML = '<option value="">请选择表</option><option value="__new__">+ 新建表</option>';
        }

        async function loadSourceDatabases() {
            const dbType = document.getElementById('db-sync-source-type').value;
            const host = document.getElementById('db-sync-source-host').value;
            const port = document.getElementById('db-sync-source-port').value;
            const user = document.getElementById('db-sync-source-user').value;
            const password = document.getElementById('db-sync-source-password').value;

            if (!host || !port || !user) return;

            try {
                const response = await fetch(`${API_BASE}/api/databases?db_type=${dbType}&host=${host}&port=${port}&user=${user}&password=${password}`);
                const result = await response.json();

                const select = document.getElementById('db-sync-source-database');
                select.innerHTML = '<option value="">请选择数据库</option>';

                if (result.success && result.databases) {
                    result.databases.forEach(db => {
                        const option = document.createElement('option');
                        option.value = db;
                        option.textContent = db;
                        select.appendChild(option);
                    });
                }

                console.log('加载源数据库列表失败:', error);

        async function loadSourceFields() {
            const dbType = document.getElementById('db-sync-source-type').value;
            const host = document.getElementById('db-sync-source-host').value;
            const port = document.getElementById('db-sync-source-port').value;
            const user = document.getElementById('db-sync-source-user').value;
            const password = document.getElementById('db-sync-source-password').value;
            const database = document.getElementById('db-sync-source-database').value;
            const table = document.getElementById('db-sync-source-table').value || document.getElementById('db-sync-source-table-select').value;

            if (!database || !table) return;

            try {
                const response = await fetch(`${API_BASE}/api/databases/${database}/tables/${table}/fields?db_type=${dbType}&host=${host}&port=${port}&user=${user}&password=${password}`);
                const result = await response.json();

                const container = document.getElementById('db-sync-fields-list');
                
                if (result.success && result.fields) {
                    container.innerHTML = `
                        <table style="width: 100%; border-collapse: collapse; margin-bottom: 10px;">
                            <thead>
                                <tr style="background: #f8fafc;">
                                    <th style="padding: 8px; text-align: left; border-bottom: 1px solid #e2e8f0;">源字段</th>
                                    <th style="padding: 8px; text-align: left; border-bottom: 1px solid #e2e8f0;">类型</th>
                                    <th style="padding: 8px; text-align: left; border-bottom: 1px solid #e2e8f0;">目标字段</th>
                                    <th style="padding: 8px; text-align: left; border-bottom: 1px solid #e2e8f0;">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${result.fields.map((field, index) => `
                                    <tr>
                                        <td style="padding: 8px; border-bottom: 1px solid #f1f5f9;">${field.name}</td>
                                        <td style="padding: 8px; border-bottom: 1px solid #f1f5f9;">${field.type}</td>
                                        <td style="padding: 8px; border-bottom: 1px solid #f1f5f9;">
                                            <input type="text" value="${field.name}" class="form-input" 
                                                   id="field-target-${index}" style="width: 150px;" />
                                            <input type="hidden" id="field-source-${index}" value="${field.name}" />
                                            <input type="hidden" id="field-type-${index}" value="${field.type}" />
                                        </td>
                                        <td style="padding: 8px; border-bottom: 1px solid #f1f5f9;">
                                            <button class="btn btn-sm btn-danger" onclick="removeField(${index})">删除</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        <button class="btn btn-sm btn-primary" onclick="addField()">+ 添加字段</button>
                    `;
                }
            } catch (error) {
                console.log('加载字段失败:', error);
            }
        }

        function removeField(index) {
            const container = document.getElementById('db-sync-fields-list');
            const rows = container.querySelectorAll('tbody tr');
            if (rows.length > 1) {
                rows[index].remove();
            }
        }

        function addField() {
            const container = document.getElementById('db-sync-fields-list');
            const rows = container.querySelectorAll('tbody tr');
            const index = rows.length;
            
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td style="padding: 8px; border-bottom: 1px solid #f1f5f9;">
                    <input type="text" placeholder="源字段名" class="form-input" id="field-source-${index}" style="width: 120px;" />
                </td>
                <td style="padding: 8px; border-bottom: 1px solid #f1f5f9;">
                    <select class="form-select" id="field-type-${index}" style="width: 100px;">
                        <option value="INT">INT</option>
                        <option value="STRING">STRING</option>
                        <option value="DATETIME">DATETIME</option>
                        <option value="BOOLEAN">BOOLEAN</option>
                    </select>
                </td>
                <td style="padding: 8px; border-bottom: 1px solid #f1f5f9;">
                    <input type="text" placeholder="目标字段名" class="form-input" id="field-target-${index}" style="width: 150px;" />
                </td>
                <td style="padding: 8px; border-bottom: 1px solid #f1f5f9;">
                    <button class="btn btn-sm btn-danger" onclick="removeField(${index})">删除</button>
                </td>
            `;
            
            container.querySelector('tbody').appendChild(newRow);
        }

            const dbType = document.getElementById('db-sync-target-type').value;

        function updateTargetTableInput() {
            const select = document.getElementById('db-sync-target-table-select');
            const input = document.getElementById('db-sync-target-table');

            if (select.value && select.value !== '__new__') {
                input.value = select.value;
                input.disabled = true;
            } else {
                input.value = '';
                input.disabled = false;
            }
        }

        async function createDbSyncTask(event) {
            event.preventDefault();
            
            // 获取字段映射
            const fieldMapping = [];
            const rows = document.querySelectorAll('#db-sync-fields-list tbody tr');
            rows.forEach((row, index) => {
                const source = document.getElementById(`field-source-${index}`)?.value;
                const target = document.getElementById(`field-target-${index}`)?.value;
                const type = document.getElementById(`field-type-${index}`)?.value;
                if (source && target) {
                    fieldMapping.push({ source, target, type });
                }
            });

            const task = {
                source_type: document.getElementById('db-sync-source-type').value,
                source_host: document.getElementById('db-sync-source-host').value,
                source_port: parseInt(document.getElementById('db-sync-source-port').value),
                source_user: document.getElementById('db-sync-source-user').value,
                source_password: document.getElementById('db-sync-source-password').value,
                source_database: document.getElementById('db-sync-source-database').value,
                source_table: document.getElementById('db-sync-source-table').value || document.getElementById('db-sync-source-table-select').value,
                target_type: document.getElementById('db-sync-target-type').value,
                target_host: document.getElementById('db-sync-target-host').value,
                target_port: parseInt(document.getElementById('db-sync-target-port').value),
                target_user: document.getElementById('db-sync-target-user').value,
                target_password: document.getElementById('db-sync-target-password').value,
                target_database: document.getElementById('db-sync-target-database').value,
                target_table: document.getElementById('db-sync-target-table').value,
                mode: document.getElementById('db-sync-mode').value,
                field_mapping: fieldMapping
            };

            try {
                const response = await fetch(`${API_BASE}/api/db-sync/tasks`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(task)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '创建失败');
                }

                showAlert('success', '数据库同步任务创建成功！', 'db-sync-alert');
                closeDbSyncModal();
                loadDbSyncTasks();
            } catch (error) {
                showAlert('error', '创建失败: ' + error.message, 'db-sync-alert');
            }
        }

        async function startDbSyncTask(taskId) {
            try {
                const response = await fetch(`${API_BASE}/api/db-sync/tasks/${taskId}/start`, {
                    method: 'POST'
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '启动失败');
                }
                showAlert('success', '任务已启动！', 'db-sync-alert');
                loadDbSyncTasks();
            } catch (error) {
                showAlert('error', '启动失败: ' + error.message, 'db-sync-alert');
            }
        }

        async function stopDbSyncTask(taskId) {
            try {
                const response = await fetch(`${API_BASE}/api/db-sync/tasks/${taskId}/stop`, {
                    method: 'POST'
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '停止失败');
                }
                showAlert('success', '任务已停止！', 'db-sync-alert');
                loadDbSyncTasks();
            } catch (error) {
                showAlert('error', '停止失败: ' + error.message, 'db-sync-alert');
            }
        }

        async function syncDbNow(taskId) {
            try {
                const response = await fetch(`${API_BASE}/api/db-sync/tasks/${taskId}/sync-now`, {
                    method: 'POST'
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '同步失败');
                }
                const result = await response.json();
                showAlert('success', '同步成功！' + (result.message || ''), 'db-sync-alert');
                loadDbSyncTasks();
            } catch (error) {
                showAlert('error', '同步失败: ' + error.message, 'db-sync-alert');
            }
        }

        async function refreshDbSyncStatus(taskId) {
            try {
                const response = await fetch(`${API_BASE}/api/db-sync/tasks/${taskId}/status`);
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '刷新失败');
                }
                showAlert('success', '状态已刷新！', 'db-sync-alert');
                loadDbSyncTasks();
            } catch (error) {
                showAlert('error', '刷新失败: ' + error.message, 'db-sync-alert');
            }
        }

        async function deleteDbSyncTask(taskId) {
            if (!confirm('确定要删除这个任务吗？')) return;
            try {
                const response = await fetch(`${API_BASE}/api/db-sync/tasks/${taskId}`, {
                    method: 'DELETE'
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '删除失败');
                }
                showAlert('success', '任务已删除！', 'db-sync-alert');
                loadDbSyncTasks();
            } catch (error) {
                showAlert('error', '删除失败: ' + error.message, 'db-sync-alert');
            }
        }

        loadGitTasks();
    </script>
